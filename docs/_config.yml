title: Light Rewrite
description: Lighting comparison mod for The Witcher 3

# GitHub Pages project site — matches origin (https://github.com/webspam/LightRewrite)
url: "https://webspam.github.io"
baseurl: "/LightRewrite"

# Pinned jekyll/minima (master @ 2026-05-06)
remote_theme: jekyll/minima@4de322363fca5927e6f4012cb94f6dad69ab5e6c
plugins:
  - jekyll-remote-theme

# GitHub Pages loads jekyll-titles-from-headings by default; without strip_title, the first # heading
# becomes page.title (theme prints <h1>) and the heading stays in the body → duplicate title.
titles_from_headings:
  strip_title: true

minima:
  skin: dark
