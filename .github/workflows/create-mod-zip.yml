name: Create Mod Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v1.0.0)"
        required: true
        type: string
      release_name:
        description: "Release name (optional, defaults to tag)"
        required: false
        type: string
      summary:
        description: "One-line summary (optional)"
        required: false
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: true

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create folder structure and copy files
        run: |
          mkdir -p mods/modLightRewrite/content/scripts/local
          cp -r src/* mods/modLightRewrite/content/scripts/local/

      - name: Create zip file
        run: |
          zip -r modLightRewrite.zip mods/

      - name: Build release notes
        run: |
          # Collect commits since the last tag, or all commits if this is the first release
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            CHANGES=$(git log "$LAST_TAG"..HEAD --oneline --no-merges)
          else
            CHANGES=$(git log --oneline --no-merges)
          fi

          {
            SUMMARY="${{ inputs.summary }}"
            if [ -n "$SUMMARY" ]; then
              echo "$SUMMARY"
              echo ""
            fi
            echo "## Changes"
            if [ -n "$CHANGES" ]; then
              echo "$CHANGES" | while IFS= read -r line; do echo "- $line"; done
            else
              echo "_No changes since last release._"
            fi
          } > release-notes.md

      - name: Create Draft Release
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          RELEASE_TITLE="${{ inputs.release_name }}"
          if [ -z "$RELEASE_TITLE" ]; then
            RELEASE_TITLE="${{ inputs.tag }}"
          fi
          gh release create "${{ inputs.tag }}" \
            --title "$RELEASE_TITLE" \
            --draft \
            --notes-file release-notes.md \
            $PRERELEASE_FLAG \
            modLightRewrite.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
