name: Create Mod Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v1.0.0)"
        required: true
        type: string
      release_name:
        description: "Release name (optional, defaults to tag)"
        required: false
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: true

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create folder structure and copy files
        run: |
          mkdir -p mods/modLightRewrite/content/scripts/local
          cp -r src/* mods/modLightRewrite/content/scripts/local/

      - name: Create zip file
        run: |
          zip -r modLightRewrite.zip mods/

      - name: Create Draft Release
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          RELEASE_TITLE="${{ inputs.release_name }}"
          if [ -z "$RELEASE_TITLE" ]; then
            RELEASE_TITLE="${{ inputs.tag }}"
          fi
          gh release create "${{ inputs.tag }}" \
            --title "$RELEASE_TITLE" \
            --draft \
            $PRERELEASE_FLAG \
            modLightRewrite.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
