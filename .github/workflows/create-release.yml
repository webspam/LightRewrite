name: Create Mod Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag (e.g., v1.0.0)"
        required: true
        type: string
      title:
        description: "Title (defaults to tag)"
        required: false
        type: string
      summary:
        description: "Summary (appears above auto-generated notes)"
        required: false
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: true

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create folder structure and copy files
        run: |
          mkdir -p mods/modLightRewrite/content/scripts/local
          cp -r src/* mods/modLightRewrite/content/scripts/local/

      - name: Create zip file
        run: |
          zip -r modLightRewrite-${{ inputs.tag }}.zip mods/

      - name: Create Draft Release
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          RELEASE_TITLE="${{ inputs.title }}"
          if [ -z "$RELEASE_TITLE" ]; then
            RELEASE_TITLE="${{ inputs.tag }}"
          fi
          
          NOTES_FLAG="--generate-notes"
          if [ -n "${{ inputs.summary }}" ]; then
            echo "${{ inputs.summary }}" > summary.md
            NOTES_FLAG="--notes-file summary.md --generate-notes"
          fi
          
          gh release create "${{ inputs.tag }}" \
            --title "$RELEASE_TITLE" \
            --draft \
            $NOTES_FLAG \
            $PRERELEASE_FLAG \
            modLightRewrite-${{ inputs.tag }}.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
